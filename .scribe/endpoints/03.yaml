name: Verifikasi
description: |-

  API untuk verifikasi keaslian dokumen surat melalui QR Code TTE (Tanda Tangan Elektronik)
endpoints:
  -
    custom: []
    httpMethods:
      - GET
    uri: 'api/v1/verifikasi/{hash}'
    metadata:
      custom: []
      groupName: Verifikasi
      groupDescription: |-

        API untuk verifikasi keaslian dokumen surat melalui QR Code TTE (Tanda Tangan Elektronik)
      subgroup: ''
      subgroupDescription: ''
      title: 'Verifikasi QR Code TTE'
      description: |-
        Memverifikasi keaslian dokumen surat berdasarkan hash QR Code.
        Hash menggunakan SHA-256 untuk keamanan.
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters:
      hash:
        custom: []
        name: hash
        description: 'Hash SHA-256 dari QR Code.'
        required: true
        example: abc123def456789
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
    cleanUrlParameters:
      hash: abc123def456789
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: |-
          {
            "valid": true,
            "message": "Dokumen valid",
            "data": {
              "nomor_registrasi": "REG/2026/06/00001",
              "jenis_surat": "Surat Keterangan Domisili",
              "nama_pemohon": "John Doe",
              "nik_pemohon": "1234567890123456",
              "tanggal_terbit": "01-06-2026",
              "diverifikasi_oleh": "operator"
            }
          }
        headers: []
        description: ''
      -
        custom: []
        status: 200
        content: |-
          {
            "valid": false,
            "message": "Dokumen belum selesai diproses"
          }
        headers: []
        description: ''
      -
        custom: []
        status: 404
        content: |-
          {
            "valid": false,
            "message": "Dokumen tidak ditemukan atau tidak valid"
          }
        headers: []
        description: ''
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
